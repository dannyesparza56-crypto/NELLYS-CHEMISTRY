<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nelly's Elemingle PWA</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { 
            --accent: #bb86fc; 
            --secondary: #7c4dff; 
            --orange: #ffb74d; 
            --bg: #120b1e; 
            --card: #1e142e; 
            --text: #e1bee7; 
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; padding: 10px; margin: 0; display: flex; flex-direction: column; align-items: center; }
        .box { background: var(--card); width: 95%; max-width: 450px; padding: 20px; border-radius: 20px; border: 1px solid #3c2a5c; box-shadow: 0 10px 40px rgba(0,0,0,0.6); }
        
        #game-display { background: #000; padding: 20px; border-radius: 15px; border: 2px solid var(--accent); margin-bottom: 20px; text-align: center; min-height: 180px; }
        .mystery-hint { color: var(--accent); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; }
        .element-card { font-size: 3rem; font-weight: bold; color: var(--orange); margin: 10px 0; }
        .stats { font-size: 0.9rem; color: #d1c4e9; line-height: 1.4; }

        .controls { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; color: white; transition: 0.3s; }
        .btn-low { background: #cf6679; } /* Higher button */
        .btn-high { background: #03dac6; color: #000; } /* Lower button */
        .btn-match { background: var(--secondary); grid-column: span 2; }

        .grid-container { height: 250px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; border: 1px solid #3c2a5c; }
        .el-row { display: flex; justify-content: space-between; padding: 8px; border-bottom: 1px solid #2a1b3d; font-size: 0.85rem; }
        .out-of-bounds { opacity: 0.3; text-decoration: line-through; }
    </style>
</head>
<body>
    <div class="box">
        <div id="game-display">
            <span class="mystery-hint" id="hint-text">Find the Mystery Element</span>
            <div class="element-card" id="current-el">??</div>
            <div class="stats" id="current-stats">Pick an element below to start narrowing down.</div>
        </div>

        <div class="controls">
            <button class="btn btn-low" onclick="guess('lower')">← Too Low</button>
            <button class="btn btn-high" onclick="guess('higher')">Too High →</button>
            <button class="btn btn-match" onclick="guess('match')">↑ IT'S A MATCH!</button>
        </div>

        <div class="grid-container" id="element-list"></div>
        <button class="btn" style="background:#443355; margin-top:10px; width:100%" onclick="resetGame()">New Game</button>
    </div>

    <script>
        const elements = [
            {n:1, s:"H", name:"Hydrogen", w:1.01}, {n:2, s:"He", name:"Helium", w:4.00},
            {n:3, s:"Li", name:"Lithium", w:6.94}, {n:4, s:"Be", name:"Beryllium", w:9.01},
            {n:6, s:"C", name:"Carbon", w:12.01}, {n:8, s:"O", name:"Oxygen", w:16.00},
            {n:13, s:"Al", name:"Aluminum", w:26.98}, {n:14, s:"Si", name:"Silicon", w:28.08},
            {n:22, s:"Ti", name:"Titanium", w:47.86}, {n:26, s:"Fe", name:"Iron", w:55.84},
            {n:79, s:"Au", name:"Gold", w:196.9}
        ];

        let mysteryIndex, currentIndex, lowerBound = 0, upperBound = 200;

        function resetGame() {
            mysteryIndex = Math.floor(Math.random() * elements.length);
            currentIndex = null;
            lowerBound = 0; upperBound = 200;
            document.getElementById('hint-text').innerText = "Mystery Element Hidden";
            document.getElementById('current-el').innerText = "??";
            renderList();
        }

        function selectEl(i) {
            currentIndex = i;
            const el = elements[i];
            document.getElementById('current-el').innerText = el.s;
            document.getElementById('current-stats').innerText = `${el.name} | Weight: ${el.w}`;
        }

        function guess(type) {
            if (currentIndex === null) return;
            const target = elements[mysteryIndex].n;
            const current = elements[currentIndex].n;

            if (type === 'match' && current === target) {
                alert("SUCCESS! You found " + elements[mysteryIndex].name);
                resetGame();
            } else if (type === 'higher' && current > target) {
                upperBound = current;
                renderList();
            } else if (type === 'lower' && current < target) {
                lowerBound = current;
                renderList();
            } else {
                alert("Incorrect deduction! Try again.");
            }
        }

        function renderList() {
            const list = document.getElementById('element-list');
            list.innerHTML = elements.map((el, i) => {
                const isOut = el.n <= lowerBound || el.n >= upperBound;
                return `<div class="el-row ${isOut?'out-of-bounds':''}" onclick="selectEl(${i})">
                    <span>${el.n}. <b>${el.s}</b></span> <span>${el.name}</span>
                </div>`;
            }).join('');
        }

        window.onload = resetGame;
        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
    </script>
</body>
</html>
