<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smartass Periodic Table Edition</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root { --accent: #bb86fc; --bg: #0d0216; --card: #1e142e; --text: #e1bee7; --correct: #03dac6; --wrong: #cf6679; --gold: #ffb74d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; overflow-x: hidden; }
        .box { background: var(--card); width: 95%; max-width: 450px; padding: 20px; border-radius: 24px; border: 1px solid #3c2a5c; box-shadow: 0 10px 50px rgba(0,0,0,0.8); margin-top: 10px; text-align: center; position: relative; z-index: 1; }
        
        h1 { font-size: 1.2rem; color: var(--accent); margin-bottom: 15px; text-transform: uppercase; letter-spacing: 2px; }
        .cat-select { width: 100%; padding: 12px; background: #000; border: 2px solid var(--accent); color: var(--accent); border-radius: 12px; margin-bottom: 15px; font-weight: bold; cursor: pointer; }

        #display { background: #000; padding: 25px; border-radius: 15px; border: 2px solid var(--accent); margin-bottom: 20px; min-height: 140px; }
        .symbol { font-size: 5.5rem; font-weight: bold; color: var(--gold); display: block; line-height: 1; text-shadow: 0 0 15px rgba(255, 183, 77, 0.4); }
        .hint-box { margin-top: 10px; }
        .rhyme-text { color: var(--gold); font-size: 1.1rem; font-weight: bold; font-style: italic; display: block; margin-bottom: 5px; }
        .family-text { color: #b39ddb; font-size: 0.7rem; text-transform: uppercase; letter-spacing: 1px; background: #2a1b3d; padding: 4px 10px; border-radius: 20px; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt { background: #2a1b3d; border: 1px solid #443355; color: white; padding: 20px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.1s; font-size: 1rem; }
        .opt:active { transform: scale(0.95); }
        .opt.right { background: var(--correct) !important; color: #000; }
        .opt.wrong { background: var(--wrong) !important; }

        #smartass-console { margin: 15px 0; min-height: 40px; color: #ff4081; font-weight: 800; font-size: 1.1rem; display: flex; align-items: center; justify-content: center; }
        .stats { font-size: 0.9rem; color: var(--accent); font-weight: bold; border-top: 1px solid #3c2a5c; padding-top: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Smartass Edition</h1>
        <select id="family-filter" class="cat-select" onchange="resetQuiz()">
            <option value="all">ALL 118 ELEMENTS</option>
            <option value="Alkali metal">ALKALI METALS</option>
            <option value="Alkaline earth metal">ALKALINE EARTH</option>
            <option value="Transition metal">TRANSITION METALS</option>
            <option value="Post-transition metal">POST-TRANSITION</option>
            <option value="Metalloid">METALLOIDS</option>
            <option value="Reactive nonmetal">NONMETALS</option>
            <option value="Noble gas">NOBLE GASES</option>
            <option value="Lanthanide">LANTHANIDES</option>
            <option value="Actinide">ACTINIDES</option>
        </select>

        <div id="display">
            <span class="symbol" id="target-symbol">?</span>
            <div class="hint-box">
                <span id="rhyme-hint" class="rhyme-text"></span>
                <span id="family-hint" class="family-text"></span>
            </div>
        </div>

        <div class="options-grid" id="options"></div>
        <div id="smartass-console"></div>
        <div class="stats" id="score-text">STREAK: 0 | BEST: 0</div>
    </div>

    <script>
        const elements = [
            {s:"H", n:"Hydrogen", g:"Reactive nonmetal", r:"Oxygen"}, {s:"He", n:"Helium", g:"Noble gas", r:"Medium"},
            {s:"Li", n:"Lithium", g:"Alkali metal", r:"Mithium"}, {s:"Be", n:"Beryllium", g:"Alkaline earth metal", r:"Silly-um"},
            {s:"B", n:"Boron", g:"Metalloid", r:"Moron"}, {s:"C", n:"Carbon", g:"Reactive nonmetal", r:"Garden"},
            {s:"N", n:"Nitrogen", g:"Reactive nonmetal", r:"Hydrogen"}, {s:"O", n:"Oxygen", g:"Reactive nonmetal", r:"Nitrogen"},
            {s:"F", n:"Fluorine", g:"Reactive nonmetal", r:"Marine"}, {s:"Ne", n:"Neon", g:"Noble gas", r:"Freon"},
            {s:"Na", n:"Sodium", g:"Alkali metal", r:"Podium"}, {s:"Mg", n:"Magnesium", g:"Alkaline earth metal", r:"Gymnasium"},
            {s:"Al", n:"Aluminum", g:"Post-transition metal", r:"Minim-um"}, {s:"Si", n:"Silicon", g:"Metalloid", r:"Beacon"},
            {s:"P", n:"Phosphorus", g:"Reactive nonmetal", r:"Walrus"}, {s:"S", n:"Sulfur", g:"Reactive nonmetal", r:"Golfer"},
            {s:"Cl", n:"Chlorine", g:"Reactive nonmetal", r:"Marine"}, {s:"Ar", n:"Argon", g:"Noble gas", r:"Jargon"},
            {s:"K", n:"Potassium", g:"Alkali metal", r:"Gymnasium"}, {s:"Ca", n:"Calcium", g:"Alkaline earth metal", r:"Valium"},
            {s:"Ti", n:"Titanium", g:"Transition metal", r:"Uranium"}, {s:"Fe", n:"Iron", g:"Transition metal", r:"Lion"},
            {s:"Ni", n:"Nickel", g:"Transition metal", r:"Pickle"}, {s:"Cu", n:"Copper", g:"Transition metal", r:"Hopper"},
            {s:"Zn", n:"Zinc", g:"Transition metal", r:"Think"}, {s:"Ag", n:"Silver", g:"Transition metal", r:"Quiver"},
            {s:"Au", n:"Gold", g:"Transition metal", r:"Bold"}, {s:"W", n:"Tungsten", g:"Transition metal", r:"Fun-sten"},
            {s:"Pt", n:"Platinum", g:"Transition metal", r:"Flatten-um"}, {s:"Hg", n:"Mercury", g:"Transition metal", r:"Curry"},
            {s:"Pb", n:"Lead", g:"Post-transition metal", r:"Bed"}, {s:"Rn", n:"Radon", g:"Noble gas", r:"Crayon"},
            {s:"U", n:"Uranium", g:"Actinide", r:"Titanium"}, {s:"Pu", n:"Plutonium", g:"Actinide", r:"Harmonium"},
            {s:"Og", n:"Oganesson", g:"Noble gas", r:"Lesson"}
        ];

        let streak = 0, best = 0;

        function fireConfetti(isMega) {
            if (isMega) {
                const end = Date.now() + (2 * 1000);
                const colors = ['#bb86fc', '#03dac6', '#ffb74d'];
                (function frame() {
                    confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0 }, colors: colors });
                    confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1 }, colors: colors });
                    if (Date.now() < end) requestAnimationFrame(frame);
                }());
            } else {
                confetti({ particleCount: 40, spread: 70, origin: { y: 0.6 }, colors: ['#bb86fc', '#03dac6'] });
            }
        }

        function loadQuestion() {
            const family = document.getElementById('family-filter').value;
            const filtered = family === "all" ? elements : elements.filter(e => e.g === family);
            const el = filtered[Math.floor(Math.random() * filtered.length)];
            document.getElementById('target-symbol').innerText = el.s;
            document.getElementById('rhyme-hint').innerText = `Rhymes with: ${el.r}`;
            document.getElementById('family-hint').innerText = el.g;
            let opts = [el.n];
            while(opts.length < 4) {
                let decoy = elements[Math.floor(Math.random() * elements.length)].n;
                if(!opts.includes(decoy)) opts.push(decoy);
            }
            opts.sort(() => Math.random() - 0.5);
            const grid = document.getElementById('options');
            grid.innerHTML = opts.map(o => `<button class="opt" onclick="check('${o}', '${el.n}', this)">${o}</button>`).join('');
        }

        function check(choice, correct, btn) {
            const consoleBox = document.getElementById('smartass-console');
            if (choice === correct) {
                btn.classList.add('right');
                streak++;
                if (streak > best) best = streak;

                // Regular Confetti
                fireConfetti(false);
                
                // Smartass Milestones + Mega Confetti
                if (streak === 5) {
                    consoleBox.innerText = "you finally got a streak see if you can get to 30";
                } else if (streak === 10) {
                    consoleBox.innerText = "Okay smartass";
                    fireConfetti(true);
                    setTimeout(() => { if(streak >= 10 && streak < 20) consoleBox.innerText = ""; }, 10000);
                } else if (streak === 20) {
                    consoleBox.innerText = "alright we get it lets see if you can get 30";
                    fireConfetti(true);
                } else if (streak >= 30) {
                    consoleBox.innerText = "8====D you fucking this game";
                    fireConfetti(true);
                }

                document.getElementById('score-text').innerText = `STREAK: ${streak} | BEST: ${best}`;
                setTimeout(loadQuestion, 500);
            } else {
                btn.classList.add('wrong');
                streak = 0;
                consoleBox.innerText = "Back to zero, loser."; 
                document.getElementById('score-text').innerText = `STREAK: 0 | BEST: ${best}`;
                setTimeout(() => { consoleBox.innerText = ""; loadQuestion(); }, 1200);
            }
        }

        function resetQuiz() { streak = 0; document.getElementById('smartass-console').innerText = ""; loadQuestion(); }
        window.onload = loadQuestion;
    </script>
</body>
</html>
