<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimate Element Lab</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Element Lab 118</h1>
            <div class="display-box" id="reaction-result">Select 2 Elements</div>
        </header>

        <div class="lab-slots">
            <div id="slot-1" class="slot" onclick="clearSlot(1)">+</div>
            <div class="plus">+</div>
            <div id="slot-2" class="slot" onclick="clearSlot(2)">+</div>
        </div>

        <div class="tabs">
            <button id="tab-table" class="tab-btn active" onclick="showSection('table')">Table</button>
            <button id="tab-glossary" class="tab-btn" onclick="showSection('glossary')">Combinations</button>
        </div>

        <main id="main-content">
            <div id="periodic-table" class="grid-container">
                </div>
            
            <div id="glossary-section" class="hidden">
                <h3>Reaction Guide</h3>
                <div class="glossary-box">
                    <p><strong>Ionic Bonding:</strong> Occurs between Metals (left side) and Non-metals (right side).</p>
                    <p><strong>The Zero Rule:</strong> Total charge must equal 0. 
                        <br>Example: Mg (+2) + Cl (-1) needs two Cl to work → <strong>MgCl₂</strong></p>
                    <p><strong>Noble Gases:</strong> He, Ne, Ar, Kr, Xe, Rn do not react.</p>
                </div>
            </div>
        </main>

        <button onclick="clearCache()" class="update-btn">🔄 Reset Lab & Cache</button>
    </div>
