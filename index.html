<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nelly's 118: Smartass Edition</title>
    <style>
        :root { --accent: #bb86fc; --bg: #120b1e; --card: #1e142e; --text: #e1bee7; --correct: #03dac6; --wrong: #cf6679; --gold: #ffb74d; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .box { background: var(--card); width: 95%; max-width: 450px; padding: 20px; border-radius: 24px; border: 1px solid #3c2a5c; box-shadow: 0 10px 40px rgba(0,0,0,0.6); margin-top: 10px; text-align: center; }
        
        .cat-select { width: 100%; padding: 12px; background: #090510; border: 2px solid var(--accent); color: var(--accent); border-radius: 12px; margin-bottom: 15px; font-weight: bold; cursor: pointer; }

        #display { background: #000; padding: 25px; border-radius: 15px; border: 2px solid var(--accent); margin-bottom: 20px; min-height: 140px; }
        .symbol { font-size: 5rem; font-weight: bold; color: var(--gold); display: block; line-height: 1; }
        .hint-box { margin-top: 10px; }
        .rhyme-text { color: var(--gold); font-size: 1.1rem; font-weight: bold; font-style: italic; display: block; margin-bottom: 5px; }
        .family-text { color: #b39ddb; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; border: 1px solid #3c2a5c; padding: 2px 8px; border-radius: 10px; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt { background: #2a1b3d; border: 1px solid #443355; color: white; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 0.95rem; }
        .opt.right { background: var(--correct) !important; color: #000; }
        .opt.wrong { background: var(--wrong) !important; }

        .stats { margin-top: 20px; font-size: 0.8rem; color: var(--accent); font-weight: bold; }
        
        /* Smartass Console Styling */
        #smartass-console { 
            margin-top: 15px; 
            min-height: 30px; 
            color: #ff4081; 
            font-weight: bold; 
            font-style: italic; 
            font-size: 1rem;
            text-shadow: 0 0 10px rgba(255, 64, 129, 0.5);
        }
    </style>
</head>
<body>
    <div class="box">
        <select id="family-filter" class="cat-select" onchange="resetQuiz()">
            <option value="all">ALL 118 ELEMENTS</option>
            <option value="Alkali metal">ALKALI METALS</option>
            <option value="Alkaline earth metal">ALKALINE EARTH</option>
            <option value="Transition metal">TRANSITION METALS</option>
            <option value="Post-transition metal">POST-TRANSITION</option>
            <option value="Metalloid">METALLOIDS</option>
            <option value="Reactive nonmetal">NONMETALS</option>
            <option value="Noble gas">NOBLE GASES</option>
            <option value="Lanthanide">LANTHANIDES</option>
            <option value="Actinide">ACTINIDES</option>
        </select>

        <div id="display">
            <span class="symbol" id="target-symbol">?</span>
            <div class="hint-box">
                <span id="rhyme-hint" class="rhyme-text"></span>
                <span id="family-hint" class="family-text"></span>
            </div>
        </div>

        <div class="options-grid" id="options"></div>
        
        <div id="smartass-console"></div>
        <div class="stats" id="score-text">STREAK: 0 | BEST: 0</div>
    </div>

    <script>
        const elements = [
            {s:"H", n:"Hydrogen", g:"Reactive nonmetal", r:"Oxygen"}, {s:"He", n:"Helium", g:"Noble gas", r:"Medium"},
            {s:"Li", n:"Lithium", g:"Alkali metal", r:"Mithium"}, {s:"Be", n:"Beryllium", g:"Alkaline earth metal", r:"Silly-um"},
            {s:"B", n:"Boron", g:"Metalloid", r:"Moron"}, {s:"C", n:"Carbon", g:"Reactive nonmetal", r:"Garden"},
            {s:"N", n:"Nitrogen", g:"Reactive nonmetal", r:"Hydrogen"}, {s:"O", n:"Oxygen", g:"Reactive nonmetal", r:"Nitrogen"},
            {s:"F", n:"Fluorine", g:"Reactive nonmetal", r:"Marine"}, {s:"Ne", n:"Neon", g:"Noble gas", r:"Freon"},
            {s:"Na", n:"Sodium", g:"Alkali metal", r:"Podium"}, {s:"Mg", n:"Magnesium", g:"Alkaline earth metal", r:"Gymnasium"},
            {s:"Al", n:"Aluminum", g:"Post-transition metal", r:"Minim-um"}, {s:"Si", n:"Silicon", g:"Metalloid", r:"Beacon"},
            {s:"P", n:"Phosphorus", g:"Reactive nonmetal", r:"Walrus"}, {s:"S", n:"Sulfur", g:"Reactive nonmetal", r:"Golfer"},
            {s:"Cl", n:"Chlorine", g:"Reactive nonmetal", r:"Marine"}, {s:"Ar", n:"Argon", g:"Noble gas", r:"Jargon"},
            {s:"Ti", n:"Titanium", g:"Transition metal", r:"Uranium"}, {s:"Fe", n:"Iron", g:"Transition metal", r:"Lion"},
            {s:"Cu", n:"Copper", g:"Transition metal", r:"Hopper"}, {s:"Ag", n:"Silver", g:"Transition metal", r:"Quiver"},
            {s:"Au", n:"Gold", g:"Transition metal", r:"Bold"}, {s:"W", n:"Tungsten", g:"Transition metal", r:"Fun-sten"},
            {s:"Pb", n:"Lead", g:"Post-transition metal", r:"Bed"}, {s:"Hg", n:"Mercury", g:"Transition metal", r:"Curry"},
            {s:"La", n:"Lanthanum", g:"Lanthanide", r:"Platinum"}, {s:"U", n:"Uranium", g:"Actinide", r:"Titanium"},
            {s:"Pu", n:"Plutonium", g:"Actinide", r:"Harmonium"}, {s:"Og", n:"Oganesson", g:"Noble gas", r:"Lesson"}
        ];

        let streak = 0, best = 0;

        function loadQuestion() {
            const family = document.getElementById('family-filter').value;
            const filtered = family === "all" ? elements : elements.filter(e => e.g === family);
            const el = filtered[Math.floor(Math.random() * filtered.length)];
            
            document.getElementById('target-symbol').innerText = el.s;
            document.getElementById('rhyme-hint').innerText = `Rhymes with: ${el.r}`;
            document.getElementById('family-hint').innerText = el.g;

            let opts = [el.n];
            while(opts.length < 4) {
                let decoy = elements[Math.floor(Math.random() * elements.length)].n;
                if(!opts.includes(decoy)) opts.push(decoy);
            }
            opts.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('options');
            grid.innerHTML = opts.map(o => `<button class="opt" onclick="check('${o}', '${el.n}', this)">${o}</button>`).join('');
        }

        function check(choice, correct, btn) {
            const consoleBox = document.getElementById('smartass-console');
            if (choice === correct) {
                btn.classList.add('right');
                streak++;
                if (streak > best) best = streak;
                
                // Handle Smartass Logic
                if (streak === 5) {
                    consoleBox.innerText = "you finally got a streak see if you can get to 30";
                } else if (streak === 10) {
                    consoleBox.innerText = "Okay smartass";
                    setTimeout(() => { if(streak < 20) consoleBox.innerText = ""; }, 10000);
                } else if (streak === 20) {
                    consoleBox.innerText = "alright we get it lets see if you can get 30";
                } else if (streak >= 30) {
                    consoleBox.innerText = "8====D you fucking this game";
                }

                document.getElementById('score-text').innerText = `STREAK: ${streak} | BEST: ${best}`;
                setTimeout(loadQuestion, 500);
            } else {
                btn.classList.add('wrong');
                streak = 0;
                consoleBox.innerText = ""; // Clear smartass comments on fail
                document.getElementById('score-text').innerText = `STREAK: 0 | BEST: ${best}`;
                setTimeout(loadQuestion, 1200);
            }
        }

        function resetQuiz() { streak = 0; document.getElementById('smartass-console').innerText = ""; loadQuestion(); }
        window.onload = loadQuestion;
    </script>
</body>
</html>
