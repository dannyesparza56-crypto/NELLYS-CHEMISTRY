<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nelly's Element Trainer</title>
    <style>
        :root { --accent: #bb86fc; --bg: #120b1e; --card: #1e142e; --text: #e1bee7; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; }
        .box { background: var(--card); width: 95%; max-width: 450px; padding: 20px; border-radius: 20px; border: 1px solid #3c2a5c; }
        
        /* The Recall Screen */
        #display { background: #000; padding: 30px; border-radius: 15px; border: 2px solid var(--accent); margin-bottom: 20px; text-align: center; }
        .symbol { font-size: 4rem; font-weight: bold; color: #ffb74d; display: block; }
        .reveal { color: #03dac6; font-size: 1.2rem; cursor: pointer; text-decoration: underline; margin-top: 10px; display: inline-block; }
        #answer { visibility: hidden; margin-top: 10px; font-weight: bold; font-size: 1.5rem; }

        /* Mnemonic Bar */
        .mnemonic-tip { font-style: italic; font-size: 0.85rem; color: #b39ddb; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 8px; margin-bottom: 15px; }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-wrong { background: #cf6679; color: white; }
        .btn-correct { background: #7c4dff; color: white; }

        .progress-bar { width: 100%; background: #000; height: 8px; border-radius: 4px; margin-top: 20px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: var(--accent); transition: 0.5s; }
    </style>
</head>
<body>
    <div class="box">
        <div id="display">
            <span class="symbol" id="target-symbol">??</span>
            <span class="reveal" onclick="document.getElementById('answer').style.visibility='visible'">Tap to Reveal Name</span>
            <div id="answer">ELEMENT</div>
        </div>

        <div class="mnemonic-tip" id="mnemonic-text">
            Mnemonic: "Happy Henry Likes Beer..."
        </div>

        <div class="btn-group">
            <button class="btn btn-wrong" onclick="next(false)">Forgot It</button>
            <button class="btn btn-correct" onclick="next(true)">Remembered!</button>
        </div>

        <div class="progress-bar"><div id="progress-fill"></div></div>
        <p id="stats" style="font-size: 0.8rem; text-align: center;">Mastery: 0/118</p>
    </div>

    <script>
        const elements = [
            {s:"H", n:"Hydrogen", m:"Happy"}, {s:"He", n:"Helium", m:"Henry"},
            {s:"Li", n:"Lithium", m:"Likes"}, {s:"Be", n:"Beryllium", m:"Beer"},
            {s:"B", n:"Boron", m:"But"}, {s:"C", n:"Carbon", m:"Cottage"},
            {s:"N", n:"Nitrogen", m:"Near"}, {s:"O", n:"Oxygen", m:"Our"},
            {s:"F", n:"Fluorine", m:"Friend"}, {s:"Ne", n:"Neon", m:"Nelly"}
            // ... Add the rest of the 118 here following this pattern
        ];

        let currentIndex = 0;
        let mastered = 0;

        function updateDisplay() {
            const el = elements[currentIndex];
            document.getElementById('target-symbol').innerText = el.s;
            document.getElementById('answer').innerText = el.n;
            document.getElementById('answer').style.visibility = 'hidden';
            document.getElementById('mnemonic-text').innerText = el.m ? `Mnemonic Word: "${el.m}"` : "Keep practicing this section!";
            
            const percent = (mastered / elements.length) * 100;
            document.getElementById('progress-fill').style.width = percent + "%";
            document.getElementById('stats').innerText = `Mastery: ${mastered}/${elements.length}`;
        }

        function next(correct) {
            if (correct) mastered++;
            currentIndex = (currentIndex + 1) % elements.length;
            updateDisplay();
        }

        window.onload = updateDisplay;
    </script>
</body>
</html>
