<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nelly's Chemistry: Family Mastery</title>
    <style>
        :root { --accent: #bb86fc; --bg: #120b1e; --card: #1e142e; --text: #e1bee7; --correct: #03dac6; --wrong: #cf6679; }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; }
        .box { background: var(--card); width: 95%; max-width: 450px; padding: 20px; border-radius: 24px; border: 1px solid #3c2a5c; box-shadow: 0 10px 40px rgba(0,0,0,0.6); margin-top: 10px; text-align: center; }
        
        /* Family Selector */
        .cat-select { width: 100%; padding: 12px; background: #090510; border: 2px solid var(--accent); color: var(--accent); border-radius: 12px; margin-bottom: 15px; font-weight: bold; cursor: pointer; }

        #display { background: #000; padding: 30px; border-radius: 15px; border: 2px solid var(--accent); margin-bottom: 20px; }
        .symbol { font-size: 5rem; font-weight: bold; color: #ffb74d; display: block; }
        .hint { font-size: 0.85rem; color: #b39ddb; margin-top: 10px; min-height: 20px; font-style: italic; }

        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .opt { background: #2a1b3d; border: 1px solid #443355; color: white; padding: 18px; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 1rem; }
        .opt.right { background: var(--correct) !important; color: #000; }
        .opt.wrong { background: var(--wrong) !important; color: white; }

        .stats-container { margin-top: 25px; padding-top: 15px; border-top: 1px solid #3c2a5c; }
        #score-text { font-size: 0.8rem; color: var(--accent); font-weight: bold; letter-spacing: 1px; }
    </style>
</head>
<body>
    <div class="box">
        <select id="family-filter" class="cat-select" onchange="resetQuiz()">
            <option value="all">All 118 Elements</option>
            <option value="Alkali metal">Alkali Metals</option>
            <option value="Alkaline earth metal">Alkaline Earth Metals</option>
            <option value="Transition metal">Transition Metals</option>
            <option value="Post-transition metal">Post-transition Metals</option>
            <option value="Metalloid">Metalloids</option>
            <option value="Reactive nonmetal">Reactive Nonmetals</option>
            <option value="Noble gas">Noble Gases</option>
            <option value="Lanthanide">Lanthanides</option>
            <option value="Actinide">Actinides</option>
        </select>

        <div id="display">
            <span class="symbol" id="target-symbol">?</span>
            <div class="hint" id="mnemonic-hint">Select a category to start</div>
        </div>

        <div class="options-grid" id="options"></div>

        <div class="stats-container">
            <div id="score-text">STREAK: 0 | BEST: 0</div>
        </div>
    </div>

    <script>
        // Full Dataset structured by your specific categories
        const elements = [
            {s:"H", n:"Hydrogen", g:"Reactive nonmetal"}, {s:"He", n:"Helium", g:"Noble gas"},
            {s:"Li", n:"Lithium", g:"Alkali metal"}, {s:"Be", n:"Beryllium", g:"Alkaline earth metal"},
            {s:"B", n:"Boron", g:"Metalloid"}, {s:"C", n:"Carbon", g:"Reactive nonmetal"},
            {s:"Al", n:"Aluminum", g:"Post-transition metal"}, {s:"Si", n:"Silicon", g:"Metalloid"},
            {s:"Ti", n:"Titanium", g:"Transition metal"}, {s:"Fe", n:"Iron", g:"Transition metal"},
            {s:"Cu", n:"Copper", g:"Transition metal"}, {s:"Ag", n:"Silver", g:"Transition metal"},
            {s:"Au", n:"Gold", g:"Transition metal"}, {s:"Pb", n:"Lead", g:"Post-transition metal"},
            {s:"Xe", n:"Xenon", g:"Noble gas"}, {s:"Ce", n:"Cerium", g:"Lanthanide"},
            {s:"U", n:"Uranium", g:"Actinide"}, {s:"Og", n:"Oganesson", g:"Noble gas"}
            // Note: Add remaining 118 elements following this group naming convention
        ];

        let streak = 0, best = 0;

        function loadQuestion() {
            const family = document.getElementById('family-filter').value;
            const filtered = family === "all" ? elements : elements.filter(e => e.g === family);
            
            if (filtered.length < 1) {
                document.getElementById('mnemonic-hint').innerText = "Category data loading...";
                return;
            }

            const el = filtered[Math.floor(Math.random() * filtered.length)];
            document.getElementById('target-symbol').innerText = el.s;
            document.getElementById('mnemonic-hint').innerText = `Identify this ${el.g}`;

            // Generate 4 options from the filtered list (or all elements if filtered list is too small)
            let optionPool = filtered.length >= 4 ? filtered : elements;
            let opts = [el.n];
            while(opts.length < 4) {
                let decoy = optionPool[Math.floor(Math.random() * optionPool.length)].n;
                if(!opts.includes(decoy)) opts.push(decoy);
            }
            opts.sort(() => Math.random() - 0.5);

            const grid = document.getElementById('options');
            grid.innerHTML = opts.map(o => `<button class="opt" onclick="check('${o}', '${el.n}', this)">${o}</button>`).join('');
        }

        function check(choice, correct, btn) {
            if (choice === correct) {
                btn.classList.add('right');
                streak++;
                if (streak > best) best = streak;
                document.getElementById('score-text').innerText = `STREAK: ${streak} | BEST: ${best}`;
                setTimeout(loadQuestion, 500);
            } else {
                btn.classList.add('wrong');
                streak = 0;
                document.getElementById('score-text').innerText = `STREAK: 0 | BEST: ${best}`;
                document.getElementById('mnemonic-hint').innerText = `Nope! That's ${correct}.`;
                setTimeout(loadQuestion, 1500);
            }
        }

        function resetQuiz() { streak = 0; loadQuestion(); }
        window.onload = loadQuestion;
    </script>
</body>
</html>
