<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Element Lab</title>
    <style>
        body { background: #0d1117; color: #c9d1d9; font-family: sans-serif; text-align: center; padding: 10px; margin: 0; }
        .box { background: #161b22; max-width: 400px; margin: auto; padding: 20px; border-radius: 12px; border: 1px solid #30363d; }
        #res { background: #000; padding: 15px; border-radius: 8px; border: 1px solid #58a6ff; color: #ffa657; font-size: 1.5rem; font-weight: bold; margin-bottom: 10px; }
        .slots { display: flex; justify-content: center; align-items: center; gap: 10px; margin: 15px 0; }
        .slot { width: 50px; height: 50px; border: 2px dashed #444; border-radius: 8px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; height: 300px; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px; }
        .el { background: #21262d; padding: 10px 2px; border-radius: 6px; border: 1px solid #58a6ff; font-size: 0.8rem; cursor: pointer; color: white; }
        button { width: 100%; margin-top: 10px; padding: 12px; border-radius: 6px; border: none; font-weight: bold; cursor: pointer; }
        .btn-clr { background: #30363d; color: white; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Element Builder</h1>
        <div id="res">Select 2 Elements</div>
        <div class="slots">
            <div id="s1" class="slot" onclick="clr(1)">?</div>
            <div>+</div>
            <div id="s2" class="slot" onclick="clr(2)">?</div>
        </div>
        <div id="g" class="grid">Loading...</div>
        <button class="btn-clr" onclick="location.reload()">Reset App</button>
    </div>

    <script>
        // Symbol, Name, Valency, Type (m=metal, nm=non-metal, n=noble)
        const d = "H,Hydro,1,nm|He,Helium,0,n|Li,Lith,1,m|Be,Beryl,2,m|B,Boron,3,m|C,Carb,4,nm|N,Nitro,-3,nm|O,Oxy,-2,nm|F,Fluor,-1,nm|Ne,Neon,0,n|Na,Sod,1,m|Mg,Mag,2,m|Al,Alum,3,m|Si,Silic,4,m|P,Phos,-3,nm|S,Sulf,-2,nm|Cl,Chlor,-1,nm|Ar,Argon,0,n|K,Pot,1,m|Ca,Calc,2,m|Fe,Iron,3,m|Cu,Cop,2,m|Ag,Silv,1,m|Au,Gold,3,m";

        let p = [null, null];

        function start() {
            const g = document.getElementById('g');
            g.innerHTML = "";
            d.split("|").forEach(i => {
                const x = i.split(",");
                const b = document.createElement('div');
                b.className = 'el';
                b.innerHTML = `<strong>${x[0]}</strong><br>${x[1]}`;
                b.onclick = () => sel({s:x[0], v:parseInt(x[2]), t:x[3]});
                g.appendChild(b);
            });
        }

        function sel(e) {
            if (!p[0]) { p[0] = e; document.getElementById('s1').innerText = e.s; }
            else if (!p[1]) { p[1] = e; document.getElementById('s2').innerText = e.s; react(); }
        }

        function react() {
            const a = p[0]; const b = p[1];
            const r = document.getElementById('res');
            if (a.t === 'n' || b.t === 'n') { r.innerText = "No Reaction"; return; }
            let vA = Math.abs(b.v); let vB = Math.abs(a.v);
            const g = (x, y) => y ? g(y, x % y) : x;
            let c = g(vA, vB); vA/=c; vB/=c;
            r.innerHTML = `${a.s}${vA==1?'':vA}${b.s}${vB==1?'':vB}`;
        }

        function clr(n) { p[n-1] = null; document.getElementById('s'+n).innerText = "?"; }

        window.onload = start;
    </script>
</body>
</html>
