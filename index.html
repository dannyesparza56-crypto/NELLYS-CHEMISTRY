<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Chem Lab</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container">
        <header>
            <h1>Element Combiner</h1>
            <div class="display-box" id="result">Tap 2 Elements</div>
        </header>

        <div class="lab-area">
            <div id="s1" class="slot" onclick="resetSlot(1)">?</div>
            <div class="plus">+</div>
            <div id="s2" class="slot" onclick="resetSlot(2)">?</div>
        </div>

        <div id="element-grid" class="grid">
            </div>

        <button onclick="location.reload()" class="clear-btn">Clear All</button>
    </div>

    <script>
        // The most common elements for daily compounds
        const simpleElements = [
            { s: "H", n: "Hydrogen", v: 1 }, { s: "O", n: "Oxygen", v: -2 },
            { s: "Na", n: "Sodium", v: 1 }, { s: "Cl", n: "Chlorine", v: -1 },
            { s: "C", n: "Carbon", v: 4 }, { s: "Fe", n: "Iron", v: 3 },
            { s: "Mg", n: "Magnesium", v: 2 }, { s: "S", n: "Sulfur", v: -2 },
            { s: "Al", n: "Aluminum", v: 3 }, { s: "N", n: "Nitrogen", v: -3 },
            { s: "He", n: "Helium", v: 0 }, { s: "Ca", n: "Calcium", v: 2 }
        ];

        let picked = [null, null];

        function buildGrid() {
            const grid = document.getElementById('element-grid');
            simpleElements.forEach(el => {
                const div = document.createElement('div');
                div.className = 'el-btn';
                div.innerHTML = `<strong>${el.s}</strong><br><small>${el.n}</small>`;
                div.onclick = () => pick(el);
                grid.appendChild(div);
            });
        }

        function pick(el) {
            if (!picked[0]) { 
                picked[0] = el; 
                document.getElementById('s1').innerText = el.s; 
            } else if (!picked[1]) { 
                picked[1] = el; 
                document.getElementById('s2').innerText = el.s; 
                combine(); 
            }
        }

        function combine() {
            const a = picked[0];
            const b = picked[1];
            const res = document.getElementById('result');

            if (a.v === 0 || b.v === 0) { res.innerText = "No Reaction!"; return; }

            // Cross-over math for the subscripts
            let valA = Math.abs(b.v);
            let valB = Math.abs(a.v);
            
            // Simplify (2 and 2 becomes 1 and 1)
            if (valA === valB) { valA = 1; valB = 1; }

            const subA = valA === 1 ? "" : valA;
            const subB = valB === 1 ? "" : valB;

            res.innerHTML = `Result: ${a.s}${subA}${b.s}${subB}`;
        }

        function resetSlot(n) {
            picked[n-1] = null;
            document.getElementById(`s${n}`).innerText = "?";
            document.getElementById('result').innerText = "Tap 2 Elements";
        }

        buildGrid();
    </script>
</body>
</html>
